# Server port
server.port=8810

# Application name
spring.application.name=product-catalog-service

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Data source (Chuyển sang MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/product_catalog?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect
spring.jpa.hibernate.ddl-auto=update
# Cho phép POST/PUT/DELETE mà không cần token bảo mật
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

