# Cổng chạy service
server.port=8817
spring.application.name=review-service

# Kết nối Database review_db
spring.datasource.url=jdbc:mysql://localhost:3306/review_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Cấu hình Hibernate (Tự động tạo bảng)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kết nối đến Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/