server.port=8811
spring.application.name=user-service
#server.servlet.context-path=/accounts

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:mysql://localhost:3306/users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# 🔥 DÙNG BẢN 8 ĐỂ HẾT LỖI 500
spring.jpa.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Hiện chi tiết để mình "soi" lỗi mapping 404
logging.level.org.springframework.web.servlet.handler.AbstractHandlerMethodMapping=DEBUG
