server.port=8813
spring.application.name=order-service

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Data source MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/orders?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect
spring.jpa.hibernate.ddl-auto=update

# Vô hiệu hóa bảo mật tạm thời (nếu muốn vào xem API nhanh không cần pass)
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration