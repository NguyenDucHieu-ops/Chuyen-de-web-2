server.port=8900
spring.application.name=api-gateway

# --- EUREKA ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# --- ZUUL CONFIG ---
zuul.prefix=/api
zuul.ignored-services=*
zuul.sensitive-headers=Cookie,Set-Cookie

# --- ROUTES (GIỮ NGUYÊN HOÀN TOÀN) ---
# 1. User Service
zuul.routes.users.path=/accounts/**
zuul.routes.users.serviceId=user-service
zuul.routes.users.strip-prefix=true 

# 2. Product Catalog
zuul.routes.catalog.path=/catalog/**
zuul.routes.catalog.serviceId=PRODUCT-CATALOG-SERVICE
zuul.routes.catalog.strip-prefix=true

# 3. Order Service
zuul.routes.orders.path=/order/**
zuul.routes.orders.serviceId=ORDER-SERVICE
zuul.routes.orders.strip-prefix=true

# 4. Payment Service 
zuul.routes.payment.path=/payment/**
zuul.routes.payment.serviceId=PAYMENT-SERVICE
zuul.routes.payment.strip-prefix=true 

# 5. Audit Service
zuul.routes.audit.path=/history/**
zuul.routes.audit.serviceId=audit-service
zuul.routes.audit.strip-prefix=true


# --- 🔥 CÁC ROUTES MỚI THÊM CHO TƯƠNG LAI 🔥 ---

# 6. Review Service (Đánh giá sản phẩm - Đang làm)
zuul.routes.reviews.path=/reviews/**
zuul.routes.reviews.serviceId=review-service
zuul.routes.reviews.strip-prefix=false

# 7. Article Service (Bài viết / Blog review)
zuul.routes.articles.path=/articles/**
zuul.routes.articles.serviceId=article-service
zuul.routes.articles.strip-prefix=false

# 8. Reward Service (Hệ thống tích Điểm thưởng)
zuul.routes.rewards.path=/rewards/**
zuul.routes.rewards.serviceId=reward-service
zuul.routes.rewards.strip-prefix=false

# 9. Minigame Service (Vòng quay may mắn / Flashsale)
zuul.routes.minigame.path=/minigame/**
zuul.routes.minigame.serviceId=minigame-service
zuul.routes.minigame.strip-prefix=false


# --- TIMEOUT ---
hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds=20000
ribbon.ReadTimeout=20000
ribbon.ConnectTimeout=20000

# Loại bỏ Header thừa từ Backend để trình duyệt không chặn CORS
zuul.ignored-headers=Access-Control-Allow-Origin, Access-Control-Allow-Methods, Access-Control-Allow-Headers
# 10. Contact Service
zuul.routes.contact.path=/contact/**
zuul.routes.contact.serviceId=contact-service
zuul.routes.contact.strip-prefix=false