# 1. Đổi cổng sang 8812 để tránh đụng độ với Gateway
server.port=8812
spring.application.name=product-recommendation-service

# 2. Cấu hình Database (Trỏ đúng vào cái product_recommendations em đang có)
spring.datasource.url=jdbc:mysql://localhost:3306/product_recommendations?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate cấu hình
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Kết nối Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka